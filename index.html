<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mazer Bio</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Barlow+Condensed:wght@400;700&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body ondragstart="return false">
    <div id="cursor"></div>
    <div id="transition-overlay"></div>
    <div id="toast-notification"></div>
    
    <div class="lang-btn" id="lang-btn">EN</div>
    <div class="lang-dropdown" id="lang-dropdown">
        <div class="lang-option" data-lang="en">English</div>
        <div class="lang-option" data-lang="ru">Русский</div>
        <div class="lang-option" data-lang="es">Español</div>
        <div class="lang-option" data-lang="fr">Français</div>
        <div class="lang-option" data-lang="de">Deutsch</div>
    </div>
    
    <div class="theme-btn" id="theme-btn">THEME</div>
    <div class="theme-dropdown" id="theme-dropdown">
        <div class="theme-option" data-theme="midnight">Midnight</div>
        <div class="theme-option" data-theme="forest">Forest</div>
        <div class="theme-option" data-theme="blood">Blood</div>
        <div class="theme-option" data-theme="void">Void</div>
    </div>

    <div class="card">
        <div class="avatar-container">
            <img src="avatar.jpg" alt="Avatar" class="avatar">
        </div>
        
        <h1 id="mazer-title">Mazer</h1>
        
        <div class="nav-buttons">
            <button class="nav-btn active" data-target="bio" id="btn-bio">Bio</button>
            <button class="nav-btn" data-target="hobbies" id="btn-hobbies">Hobbies</button>
        </div>

        <div id="bio" class="section">
            <p id="time-display" style="color: var(--gold); font-family: var(--font-ui); margin-bottom: 20px;"></p>
            <h3 style="font-family: var(--font-display); color: var(--gold2); margin-bottom: 10px;">Etiquette</h3>
            <p id="nohello-text" style="color: var(--text-muted); margin-bottom: 15px;">Please read this:</p>
            <a id="nohello-link" href="https://nohello.net/en/" target="_blank" style="color: var(--gold); text-decoration: none; display: block; margin-bottom: 20px; font-weight: 700;">nohello.net</a>
            
            <div style="display: flex; align-items: center; justify-content: center; gap: 10px;">
                <input type="checkbox" id="nohello-checkbox" style="width: 20px; height: 20px; accent-color: var(--gold);">
                <label for="nohello-checkbox" id="nohello-label">I understand</label>
            </div>
        </div>

        <div id="hobbies" class="section" style="display: none;">
            <h2 id="hobbies-title" style="font-family: var(--font-display); color: var(--gold2);">Hobbies</h2>
            <p id="hobbies-text"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
