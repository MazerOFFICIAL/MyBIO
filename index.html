<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mazer Bio</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Barlow+Condensed:wght@300;400;500;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body ondragstart="return false">
    <div id="cursor"></div>
    <div id="transition-overlay"></div>
    <div id="toast-notification"></div>
    
    <div class="lang-btn" id="lang-btn">EN</div>
    <div class="lang-dropdown" id="lang-dropdown">
        <div class="lang-option" data-lang="en">English</div>
        <div class="lang-option" data-lang="ru">Русский</div>
        <div class="lang-option" data-lang="es">Español</div>
        <div class="lang-option" data-lang="fr">Français</div>
        <div class="lang-option" data-lang="de">Deutsch</div>
    </div>
    
    <div class="theme-btn" id="theme-btn">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>
    </div>
    <div class="theme-dropdown" id="theme-dropdown">
        <div class="theme-option" data-theme="midnight">Midnight</div>
        <div class="theme-option" data-theme="forest">Forest</div>
        <div class="theme-option" data-theme="blood">Blood</div>
        <div class="theme-option" data-theme="void">Void</div>
    </div>

    <div class="card">
        <div class="avatar-container">
            <img src="avatar.jpg" alt="Avatar" class="avatar">
        </div>
        
        <h1 id="mazer-h1">Mazer</h1>
        
        <div class="nav-buttons">
            <button class="nav-btn active" data-target="bio" id="btn-bio">Bio</button>
            <button class="nav-btn" data-target="hobbies" id="btn-hobbies">Hobbies</button>
        </div>

        <div id="bio" class="section active">
            <p id="time-display" class="ui-text-gold"></p>
            <div class="etiquette-box">
                <h3 class="display-title">Etiquette</h3>
                <p id="nohello-text">Please read this before messaging:</p>
                <a id="nohello-link" href="https://nohello.net/en/" target="_blank" class="gold-link">nohello.net</a>
                
                <div class="checkbox-wrapper">
                    <div class="checkbox-container">
                        <input type="checkbox" id="nohello-checkbox" disabled>
                        <div id="nohello-overlay"></div>
                    </div>
                    <label for="nohello-checkbox" id="nohello-label">I have read and understood</label>
                </div>
                <div id="nohello-warning" class="warning-text"></div>
            </div>
        </div>

        <div id="hobbies" class="section">
            <h2 id="hobbies-title" class="display-title">Hobbies</h2>
            <p id="hobbies-text" class="body-text"></p>
        </div>
    </div>

    <div id="easter-egg-modal" class="modal">
        <div class="modal-content">
            <div class="modal-stripe"></div>
            <h2 class="display-title">Secret Found</h2>
            <p>Telegram: <span id="secret-link"></span></p>
            <button class="close-modal">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
