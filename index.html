<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mazer Bio</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Barlow+Condensed:wght@300;400;500;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body ondragstart="return false">
    <div id="transition-overlay"></div>
    <div id="toast-notification"></div>
    
    <div class="lang-btn" id="lang-btn">EN</div>
    <div class="lang-dropdown" id="lang-dropdown">
        <div class="lang-option" data-lang="en">English</div>
        <div class="lang-option" data-lang="ru">Русский</div>
        <div class="lang-option" data-lang="es">Español</div>
    </div>
    
    <div class="theme-btn" id="theme-btn">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="var(--gold)"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>
    </div>
    <div class="theme-dropdown" id="theme-dropdown">
        <div class="theme-option" data-theme="default">Default</div>
        <div class="theme-option" data-theme="light">Light</div>
        <div class="theme-option" data-theme="void">Void</div>
        <div class="theme-option" data-theme="blood">Blood</div>
        <div class="theme-option" data-theme="ice">Ice</div>
        <div class="theme-option" data-theme="forest">Forest</div>
    </div>

    <div class="card">
        <div class="avatar-container">
            <img src="avatar.jpg" alt="Avatar" class="avatar">
        </div>
        
        <h1 id="name">Mazer</h1>
        
        <div class="nav-buttons">
            <button class="nav-btn active" data-target="bio" id="btn-bio">My Bio</button>
            <button class="nav-btn" data-target="hobbies" id="btn-hobbies">Hobbies</button>
        </div>

        <div id="bio" class="section active">
            <p id="time-display" style="color: var(--gold); margin-bottom: 10px; font-family: var(--font-ui); font-size: 18px;"></p>
            <h3 id="etiquette-title" style="color: var(--gold2); font-family: var(--font-display);">Etiquette</h3>
            <p id="nohello-text" style="color: var(--text2); margin-bottom: 15px;">Please read this before messaging:</p>
            <a id="nohello-link" href="https://nohello.net/en/" target="_blank" style="display: block; margin-bottom: 20px; color: var(--gold2); font-size: 1.2rem; font-family: var(--font-display);">nohello.net</a>
            
            <div style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px;">
                <input type="checkbox" id="nohello-checkbox" style="width: 20px; height: 20px; accent-color: var(--gold);">
                <label for="nohello-checkbox" id="nohello-label" style="color: var(--text); cursor: pointer;">I have read and understood</label>
            </div>
        </div>

        <div id="hobbies" class="section" style="display: none;">
            <h2 id="hobbies-title" style="color: var(--gold2); font-family: var(--font-display);">Hobbies</h2>
            <p id="hobbies-text" style="color: var(--text2);"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
