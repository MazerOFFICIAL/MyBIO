<!DOCTYPE html>
<html lang="ru">
<head>

    <style>
        :root {
            --bg: #0e0c09;
            --bg2: #141208;
            --bg3: #1a1710;
            --surface: #1e1b13;
            --surface2: #252118;
            --surface3: #2d281d;
            --border: rgba(180,150,80,0.12);
            --border2: rgba(180,150,80,0.25);
            --border3: rgba(180,150,80,0.45);
            --gold: #c9a84c;
            --gold2: #e8c870;
            --gold3: #f5dfa0;
            --gold-dim: rgba(201,168,76,0.15);
            --gold-glow: rgba(201,168,76,0.3);
            --text: #e8dfc8;
            --text2: #a8987a;
            --text3: #6a5e48;
            --danger: #c0392b;
            --danger2: #e74c3c;
            --danger-dim: rgba(192,57,43,0.15);
            --success: #27ae60;
            --success2: #2ecc71;
            --success-dim: rgba(39,174,96,0.12);
            --font-display: 'Cinzel', serif;
            --font-ui: 'Barlow Condensed', sans-serif;
            --font-body: 'Barlow', sans-serif;
        }
        [data-theme="light"] {
            --bg: #f0ece0; --bg2: #e8e4d8; --bg3: #ddd8c8; --surface: #faf7ee; --surface2: #f5f0e0; --surface3: #eeeadb;
            --border: rgba(100,80,40,0.12); --border2: rgba(100,80,40,0.25); --border3: rgba(100,80,40,0.45);
            --gold: #8b6914; --gold2: #a07820; --gold3: #c09030; --gold-dim: rgba(139,105,20,0.1); --gold-glow: rgba(139,105,20,0.2);
            --text: #2c2410; --text2: #5a4c30; --text3: #9a8860;
            --danger: #a93226; --danger2: #c0392b; --danger-dim: rgba(169,50,38,0.1);
        }
        [data-theme="void"] {
            --bg: #040408; --bg2: #07070f; --bg3: #0c0c18; --surface: #10101e; --surface2: #16162a; --surface3: #1e1e38;
            --border: rgba(100,140,255,0.1); --border2: rgba(100,140,255,0.22); --border3: rgba(100,140,255,0.4);
            --gold: #6688ee; --gold2: #8899ff; --gold3: #aabbff; --gold-dim: rgba(100,136,238,0.12); --gold-glow: rgba(100,136,238,0.25);
            --text: #c8d4f8; --text2: #7888b8; --text3: #445588;
            --danger: #cc3366; --danger2: #ff4488; --danger-dim: rgba(204,51,102,0.15);
        }
        [data-theme="blood"] {
            --bg: #0f0404; --bg2: #160606; --bg3: #1e0808; --surface: #230c0c; --surface2: #2d1010; --surface3: #381414;
            --border: rgba(220,60,60,0.12); --border2: rgba(220,60,60,0.25); --border3: rgba(220,60,60,0.45);
            --gold: #dd4444; --gold2: #ee6666; --gold3: #ffaaaa; --gold-dim: rgba(221,68,68,0.12); --gold-glow: rgba(221,68,68,0.3);
            --text: #f8d8d8; --text2: #c89090; --text3: #886060;
            --danger: #ff6600; --danger2: #ff8822; --danger-dim: rgba(255,102,0,0.15);
        }
        [data-theme="ice"] {
            --bg: #04080f; --bg2: #07101a; --bg3: #0c1a28; --surface: #102030; --surface2: #162840; --surface3: #1e3450;
            --border: rgba(120,200,240,0.1); --border2: rgba(120,200,240,0.22); --border3: rgba(120,200,240,0.4);
            --gold: #60c8ee; --gold2: #88ddff; --gold3: #bbeeff; --gold-dim: rgba(96,200,238,0.1); --gold-glow: rgba(96,200,238,0.25);
            --text: #d0eef8; --text2: #7aaac8; --text3: #405878;
            --danger: #ee4466; --danger2: #ff6688; --danger-dim: rgba(238,68,102,0.15);
        }
        [data-theme="forest"] {
            --bg: #050d06; --bg2: #09140a; --bg3: #0e1c10; --surface: #122416; --surface2: #182e1c; --surface3: #203824;
            --border: rgba(80,160,80,0.12); --border2: rgba(80,160,80,0.25); --border3: rgba(80,160,80,0.45);
            --gold: #5caa5c; --gold2: #78cc78; --gold3: #aaeeaa; --gold-dim: rgba(92,170,92,0.12); --gold-glow: rgba(92,170,92,0.25);
            --text: #d0f0d0; --text2: #80b880; --text3: #487048;
            --danger: #dd4422; --danger2: #ff6644; --danger-dim: rgba(221,68,34,0.15);
        }
        * {
            box-sizing: border-box; margin: 0; padding: 0;
            user-select: none !important;
            -webkit-user-select: none !important;
            -webkit-user-drag: none !important;
            cursor: none !important;
        }
        body {
            background-color: var(--bg);
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px),
                repeating-linear-gradient(90deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px);
            background-size: 40px 40px;
            color: var(--text);
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
        }
        header {
            background: var(--bg2);
            border-bottom: 1px solid var(--border2);
            padding: 0 clamp(16px,3vw,32px);
            height: 64px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 40px rgba(0,0,0,0.6);
        }
        header::before {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), var(--gold2), var(--gold), transparent);
            opacity: 0.6;
        }
        .logo-area { display: flex; align-items: center; gap: 14px; }
        .logo-icon {
            width: 36px; height: 36px;
            border: 1px solid var(--border3);
            display: flex; align-items: center; justify-content: center;
            transform: rotate(45deg); flex-shrink: 0;
            background: var(--gold-dim);
        }
        .logo-icon-inner {
            width: 12px; height: 12px; background: var(--gold);
            transform: rotate(0deg); box-shadow: 0 0 12px var(--gold-glow);
        }
        .logo-area h1 {
            font-family: var(--font-display);
            font-size: 20px; font-weight: 700;
            color: var(--gold2); letter-spacing: 3px; text-transform: uppercase;
        }
        .header-nav {
            display: flex; align-items: center; gap: 4px;
            background: var(--bg); border: 1px solid var(--border2); padding: 4px;
        }
        .tab-btn {
            font-family: var(--font-ui); font-size: 12px; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase;
            padding: 8px 24px; background: transparent; border: none;
            color: var(--text3); position: relative; transition: color 0.2s;
        }
        .tab-btn::after {
            content: ''; position: absolute; bottom: 0; left: 10px; right: 10px;
            height: 2px; background: var(--gold); transform: scaleX(0); transition: transform 0.2s;
        }
        .tab-btn:hover { color: var(--text2); }
        .tab-btn.active { color: var(--gold2); }
        .tab-btn.active::after { transform: scaleX(1); }
        .controls-area { display: flex; gap: 8px; align-items: center; }
        .hdr-select {
            background: var(--bg); color: var(--text2); border: 1px solid var(--border2);
            padding: 7px 28px 7px 12px; font-family: var(--font-ui); font-size: 12px;
            font-weight: 600; letter-spacing: 1px; outline: none; appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22 width%3D%228%22 height%3D%226%22%3E%3Cpath fill%3D%22%23a8987a%22 d%3D%22M0 0l4 6 4-6z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat; background-position: right 10px center; transition: border-color 0.2s;
        }
        .hdr-select:hover { border-color: var(--border3); color: var(--text); }
        .hdr-select option { background: var(--bg2); }
        main { flex: 1; padding: clamp(16px,3vw,28px); width: 100%; max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: center; }
        .section { display: none; opacity: 0; transform: translateY(10px); transition: opacity 0.3s, transform 0.3s; width: 100%; }
        .section.active { display: block; opacity: 1; transform: translateY(0); }
        .center-stage { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0; padding: 20px; }
        .cat-card { background: var(--surface); border: 1px solid var(--border); margin-bottom: 18px; overflow: hidden; max-width: 450px; width: 100%; transition: border-color 0.3s; }
        .cat-card:hover { border-color: var(--border2); }
        .cat-head { padding: 12px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); background: var(--surface2); }
        .cat-diamond { width: 10px; height: 10px; transform: rotate(45deg); flex-shrink: 0; }
        .cat-name { font-family: var(--font-ui); font-size: 11px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: var(--text2); }
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; flex-shrink: 0; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--surface3); }
        .slider::before { position: absolute; content: ''; height: 12px; width: 12px; left: 3px; bottom: 3px; background: var(--text3); transition: 0.25s; }
        input:checked + .slider { background: var(--gold-dim); border: 1px solid var(--gold); }
        input:checked + .slider::before { transform: translateX(16px); background: var(--gold); }
        .m-btn { padding: 14px 20px; font-family: var(--font-ui); font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; border: 1px solid; transition: all 0.15s; background: transparent; width: 100%; }
        .m-btn.again { border-color: var(--border2); color: var(--text2); }
        .m-btn.again:hover { border-color: var(--gold); color: var(--gold2); background: var(--gold-dim); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 200; opacity: 0; visibility: hidden; transition: opacity 0.25s, visibility 0.25s; }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal-box { background: var(--surface); border: 1px solid var(--border2); max-width: 480px; width: 90%; position: relative; transform: translateY(20px) scale(0.97); transition: transform 0.25s; overflow: hidden; }
        .modal-overlay.show .modal-box { transform: translateY(0) scale(1); }
        .modal-stripe { height: 6px; background: var(--modal-color, var(--gold)); }
        .modal-body { padding: 36px 40px 40px; text-align: center; }
        .modal-name { font-family: var(--font-display); font-size: 28px; font-weight: 700; color: var(--text); margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
        .corner-deco { position: absolute; width: 20px; height: 20px; border-color: var(--border2); border-style: solid; }
        .corner-deco.tl { top: 6px; left: 6px; border-width: 1px 0 0 1px; }
        .corner-deco.tr { top: 6px; right: 6px; border-width: 1px 1px 0 0; }
        .corner-deco.bl { bottom: 6px; left: 6px; border-width: 0 0 1px 1px; }
        .corner-deco.br { bottom: 6px; right: 6px; border-width: 0 1px 1px 0; }
        #cursor {
            position: fixed; width: 28px; height: 28px; pointer-events: none; z-index: 20000;
            left: 0; top: 0; transform: translate3d(-10px, -10px, 0); opacity: 0;
            transition: opacity 0.2s ease; will-change: transform;
        }
        #cursor svg path { fill: var(--gold); stroke: var(--bg); filter: drop-shadow(0 0 5px var(--gold-glow)); }
        .wheel-outer { position: absolute; inset: -10px; border: 2px solid var(--border3); border-radius: 50%; box-shadow: inset 0 0 60px rgba(0,0,0,0.8), 0 0 40px rgba(0,0,0,0.6); }
        #toast-notification {
            position: fixed; top: -60px; left: 50%; transform: translateX(-50%); background: var(--surface2);
            border: 1px solid var(--gold); color: var(--gold2); padding: 12px 25px;
            z-index: 10001; opacity: 0; transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); font-family: var(--font-ui); font-weight: 600;
            letter-spacing: 2px; text-transform: uppercase; visibility: hidden;
        }
        #toast-notification.show { top: 30px; opacity: 1; visibility: visible; }
        .btn-action { margin-top: 20px; padding: 10px 20px; font-family: var(--font-ui); font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; background: var(--bg2); border: 1px solid var(--border2); color: var(--text3); transition: 0.3s; width: 100%; }
        .btn-action.enabled { border-color: var(--success); color: var(--success2); background: var(--success-dim); }
        .btn-action.enabled:hover { background: var(--success); color: #000; }
        @media (max-width: 768px) { #cursor { display: none; } * { cursor: auto !important; } }
    </style>
</head>

                        <div style="position: relative; display: flex; align-items: center; justify-content: center; gap: 12px;">
                            <div style="position: relative; width: 34px; height: 18px;">
                                <label class="switch">

                                </label>
                                <div id="nohello-overlay" style="position: absolute; inset: 0; z-index: 10;"></div>
                            </div>

        </section>

        <section id="hobbies" class="section">
            <div class="center-stage">
                <div class="cat-card" style="max-width: 600px;">
                    <div class="cat-head">

                    <div style="padding: 40px 30px;">

                    </div>
                </div>
            </div>
        </section>
    </main>

                <div class="modal-btns" style="grid-template-columns: 1fr;">

                </div>
            </div>
        </div>

                    greetings: { morning: "Guten Morgen", afternoon: "Guten Tag", evening: "Guten Abend", night: "Gute Nacht" },
                    copied: "Zugang Gewährt!",
                    nohelloTitle: "Kommunikationsetikette", nohelloText: "Bitte vor dem Schreiben lesen:",
                    nohelloLabel: "Ich habe gelesen und verstanden", nohelloWarning: "Zuerst nohello.net lesen",
                    continueBtn: "Fortfahren"
                }
            }
        };

        let currentLang = localStorage.getItem('siteLang') || 'en';
        let currentTheme = localStorage.getItem('siteTheme') || 'gold';

        document.addEventListener('DOMContentLoaded', () => {
            initCursor();
            initTheme();
            initLanguage();
            initNavigation();
            initTime();
            initEasterEgg();
            initNoHello();
        });

        function initCursor() {
            const cursor = document.getElementById('cursor');
            if (window.innerWidth > 768) {
                document.addEventListener('mousemove', e => {
                    cursor.style.opacity = '1';
                    cursor.style.transform = `translate3d(${e.clientX - 10}px, ${e.clientY - 10}px, 0)`;
                });
                document.addEventListener('mouseleave', () => cursor.style.opacity = '0');
            }
        }

        function initTheme() {
            applyTheme(currentTheme);
            document.getElementById('theme-select').value = currentTheme;
            document.getElementById('theme-select').addEventListener('change', e => {
                applyTheme(e.target.value);
            });
        }

        function applyTheme(theme) {
            currentTheme = theme;
            localStorage.setItem('siteTheme', theme);
            
            const map = {
                'gold': 'default',
                'midnight': 'void',
                'forest': 'forest',
                'ocean': 'ice',
                'nebula': 'void'
            };
            
            document.body.setAttribute('data-theme', map[theme] || 'default');
        }

        function initLanguage() {
            applyLanguage(currentLang);
            document.getElementById('lang-select').value = currentLang;
            document.getElementById('lang-select').addEventListener('change', e => {
                applyLanguage(e.target.value);
            });
        }

        function applyLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('siteLang', lang);
            const t = CONFIG.translations[lang] || CONFIG.translations['en'];

            document.getElementById('btn-bio').textContent = t.bioBtn;
            document.getElementById('btn-hobbies').textContent = t.hobbiesBtn;
            document.getElementById('hobbies-title').textContent = t.hobbiesTitle;
            document.getElementById('hobbies-text').textContent = t.hobbiesText;
            document.getElementById('nohello-title').textContent = t.nohelloTitle;
            document.getElementById('nohello-text').textContent = t.nohelloText;
            document.getElementById('nohello-label').textContent = t.nohelloLabel;
            document.getElementById('nohello-submit').textContent = t.continueBtn;
            
            const h = new Date().getHours();
            const timeOfDay = h < 6 ? 'night' : h < 12 ? 'morning' : h < 18 ? 'afternoon' : 'evening';
            document.getElementById('greeting').textContent = t.greetings[timeOfDay];
        }

        function initNavigation() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', e => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                    e.target.classList.add('active');
                    document.getElementById(e.target.dataset.target).classList.add('active');
                });
            });
        }

        function initTime() {
            function update() {
                const now = new Date();
                const timeString = now.toLocaleTimeString('en-GB', {
                    timeZone: 'Europe/Warsaw',
                    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
                });
                const t = CONFIG.translations[currentLang] || CONFIG.translations['en'];
                document.getElementById('local-time').textContent = `${t.timePrefix}${timeString} (PL)`;
            }
            update();
            setInterval(update, 1000);
        }

        function initNoHello() {
            const link = document.getElementById('nohello-link');
            const overlay = document.getElementById('nohello-overlay');
            const checkbox = document.getElementById('nohello-checkbox');
            const warning = document.getElementById('nohello-warning');
            const submitBtn = document.getElementById('nohello-submit');
            let hasRead = false;

            link.addEventListener('click', () => {
                hasRead = true;
                overlay.style.display = 'none';
                checkbox.disabled = false;
                warning.style.display = 'none';
            });

            overlay.addEventListener('click', () => {
                if (!hasRead) {
                    warning.textContent = CONFIG.translations[currentLang].nohelloWarning;
                    warning.style.display = 'block';
                }
            });

            checkbox.addEventListener('change', e => {
                if (e.target.checked) {
                    submitBtn.disabled = false;
                    submitBtn.classList.add('enabled');
                } else {
                    submitBtn.disabled = true;
                    submitBtn.classList.remove('enabled');
                }
            });

            submitBtn.addEventListener('click', () => {
                if (submitBtn.disabled) return;
                showToast(CONFIG.translations[currentLang].copied);
            });
        }

        function initEasterEgg() {
            const h1 = document.getElementById('mazer-title');
            const modal = document.getElementById('easter-egg-modal');
            let clickCount = 0;
            let clickTimer = null;

            h1.addEventListener('click', () => {
                clickCount++;
                if (clickTimer) clearTimeout(clickTimer);
                clickTimer = setTimeout(() => { clickCount = 0; }, 1000);

                if (clickCount === 3) {
                    document.getElementById('secret-target').textContent = atob(CONFIG.secretTgLink);
                    modal.classList.add('show');
                    clickCount = 0;
                    clearTimeout(clickTimer);
                }
            });

            document.getElementById('close-modal').addEventListener('click', () => {
                modal.classList.remove('show');
            });
        }

        function showToast(msg) {
            const toast = document.getElementById('toast-notification');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
