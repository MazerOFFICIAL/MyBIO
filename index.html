<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mazer | Bio </title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0e0c09; --bg2: #141208; --bg3: #1a1710;
            --surface: #1e1b13; --surface2: #252118; --surface3: #2d281d;
            --border: rgba(180,150,80,0.12); --border2: rgba(180,150,80,0.25); --border3: rgba(180,150,80,0.45);
            --gold: #c9a84c; --gold2: #e8c870; --gold3: #f5dfa0; --gold-dim: rgba(201,168,76,0.15); --gold-glow: rgba(201,168,76,0.3);
            --text: #e8dfc8; --text2: #a8987a; --text3: #6a5e48;
            --danger: #c0392b; --danger2: #e74c3c; --danger-dim: rgba(192,57,43,0.15);
            --font-display: 'Cinzel', serif; --font-ui: 'Barlow Condensed', sans-serif; --font-body: 'Barlow', sans-serif;
        }

        [data-theme="void"] {
            --bg: #040408; --bg2: #07070f; --surface: #10101e; --surface2: #16162a;
            --gold: #6688ee; --gold2: #8899ff; --gold-glow: rgba(100,136,238,0.3); --border: rgba(100,140,255,0.1);
        }
        [data-theme="blood"] {
            --bg: #0f0404; --bg2: #160606; --surface: #230c0c; --surface2: #2d1010;
            --gold: #dd4444; --gold2: #ee6666; --gold-glow: rgba(221,68,68,0.3); --border: rgba(220,60,60,0.12);
        }
        [data-theme="forest"] {
            --bg: #050d06; --bg2: #09140a; --surface: #122416; --surface2: #182e1c;
            --gold: #5caa5c; --gold2: #78cc78; --gold-glow: rgba(92,170,92,0.3); --border: rgba(80,160,80,0.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none !important; cursor: none !important; }
        
        body {
            background-color: var(--bg);
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px),
                repeating-linear-gradient(90deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px);
            background-size: 40px 40px;
            color: var(--text); font-family: var(--font-body);
            min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden;
        }

        #cursor {
            position: fixed; width: 30px; height: 30px; pointer-events: none; z-index: 10000; opacity: 0;
            transition: opacity 0.2s ease; transform: translate3d(-15px, -15px, 0);
        }
        #cursor svg { width: 100%; height: 100%; filter: drop-shadow(0 0 5px var(--gold)); }
        #cursor svg path { fill: var(--gold); stroke: var(--bg); stroke-width: 1px; }

        header {
            background: var(--bg2); border-bottom: 1px solid var(--border2);
            height: 64px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 30px rgba(0,0,0,0.5);
        }

        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            width: 32px; height: 32px; border: 1px solid var(--gold);
            transform: rotate(45deg); display: flex; align-items: center; justify-content: center;
            background: var(--gold-dim);
        }
        .logo-icon div { width: 10px; height: 10px; background: var(--gold); transform: rotate(-45deg); }

        .controls-area { display: flex; gap: 10px; }
        .hdr-select {
            background: var(--bg); color: var(--text2); border: 1px solid var(--border2);
            padding: 6px 12px; font-family: var(--font-ui); font-size: 12px; font-weight: 600;
            text-transform: uppercase; outline: none; letter-spacing: 1px;
        }

        main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }

        .main-card {
            background: var(--surface); border: 1px solid var(--border2); border-top: 4px solid var(--gold);
            width: 100%; max-width: 520px; position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }

        .card-content { padding: 40px; text-align: center; }

        .avatar-container {
            position: relative; width: 160px; height: 160px; margin: 0 auto 30px;
        }
        .avatar-img {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
            border: 4px solid var(--bg2); position: relative; z-index: 5;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .avatar-pulse {
            position: absolute; inset: -10px; border: 1px solid var(--gold);
            border-radius: 50%; animation: avPulse 2s infinite; pointer-events: none;
        }
        @keyframes avPulse { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.2); opacity: 0; } }

        .user-name {
            font-family: var(--font-display); font-size: 42px; font-weight: 900;
            color: var(--gold2); letter-spacing: 6px; text-transform: uppercase;
            margin-bottom: 10px; text-shadow: 0 0 20px var(--gold-glow);
        }

        .local-time {
            font-family: var(--font-ui); color: var(--text3); font-size: 14px;
            letter-spacing: 2px; text-transform: uppercase; margin-bottom: 30px;
        }

        .tabs-nav {
            display: flex; background: var(--bg2); border: 1px solid var(--border);
            margin-bottom: 30px;
        }
        .tab-btn {
            flex: 1; background: transparent; border: none; color: var(--text3);
            padding: 14px; font-family: var(--font-ui); font-weight: 700;
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
        }
        .tab-btn.active { color: var(--gold2); background: var(--surface2); box-shadow: inset 0 -2px 0 var(--gold); }

        .section { display: none; text-align: left; }
        .section.active { display: block; animation: sectionIn 0.5s ease forwards; }
        @keyframes sectionIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* MUSIC PLAYER */
        .player-box { background: var(--bg2); border: 1px solid var(--border); padding: 20px; }
        .player-main { display: flex; gap: 20px; align-items: center; margin-bottom: 20px; }
        .track-art { 
            width: 80px; height: 80px; background: var(--surface3); 
            border: 1px solid var(--border3); flex-shrink: 0; 
            display: flex; align-items: center; justify-content: center;
            font-size: 30px;
        }
        .track-info { flex: 1; min-width: 0; }
        .track-name { 
            font-family: var(--font-ui); color: var(--gold2); font-size: 18px; 
            font-weight: 700; text-transform: uppercase; white-space: nowrap; 
            overflow: hidden; text-overflow: ellipsis;
        }
        .track-author { color: var(--text3); font-size: 12px; margin-top: 4px; }

        .visualizer {
            display: flex; align-items: flex-end; gap: 2px; height: 20px; margin-top: 10px;
        }
        .v-bar { width: 3px; background: var(--gold); animation: vMove 1s infinite alternate; }
        @keyframes vMove { from { height: 20%; } to { height: 100%; } }

        .progress-wrap { margin-bottom: 15px; }
        .progress-bar { 
            width: 100%; height: 4px; background: var(--surface3); 
            position: relative; overflow: hidden;
        }
        .progress-fill { height: 100%; background: var(--gold); width: 0%; transition: width 0.1s linear; }
        .time-labels { 
            display: flex; justify-content: space-between; 
            font-family: var(--font-ui); font-size: 10px; color: var(--text3); margin-top: 6px;
        }

        .player-controls { display: flex; justify-content: center; align-items: center; gap: 25px; }
        .p-btn { background: transparent; border: none; color: var(--text2); font-size: 20px; transition: 0.2s; }
        .p-btn:hover { color: var(--gold); transform: scale(1.1); }
        .play-pause-btn { 
            width: 50px; height: 50px; border: 1px solid var(--gold); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            color: var(--gold); background: var(--gold-dim);
        }

        .playlist { 
            margin-top: 20px; max-height: 120px; overflow-y: auto; 
            border-top: 1px solid var(--border); padding-top: 10px;
        }
        .playlist-item {
            padding: 8px 12px; font-size: 12px; color: var(--text2);
            display: flex; justify-content: space-between; transition: 0.2s;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .playlist-item:hover { background: var(--surface3); color: var(--gold); }
        .playlist-item.active { color: var(--gold); font-weight: 700; background: var(--gold-dim); }

        /* BUTTONS */
        .btn-gold {
            width: 100%; background: var(--gold-dim); border: 1px solid var(--gold);
            color: var(--gold2); padding: 16px; font-family: var(--font-display);
            font-weight: 700; text-transform: uppercase; letter-spacing: 3px;
            margin-top: 20px; transition: 0.3s;
        }
        .btn-gold:hover { background: var(--gold); color: var(--bg); box-shadow: 0 0 25px var(--gold-glow); }

        /* MODALS */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px); display: none; align-items: center;
            justify-content: center; z-index: 5000;
        }
        .modal-box {
            background: var(--surface); border: 1px solid var(--border3);
            width: 90%; max-width: 420px; position: relative; padding: 40px; text-align: center;
        }
        .modal-stripe { position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--gold); }
        .modal-title { font-family: var(--font-display); color: var(--gold2); font-size: 20px; margin-bottom: 15px; }
        .modal-text { color: var(--text2); font-size: 14px; margin-bottom: 25px; line-height: 1.6; }
        
        .nohello-link { 
            color: var(--gold); font-family: var(--font-display); font-size: 24px; 
            text-decoration: none; display: block; margin-bottom: 30px;
            transition: 0.3s;
        }
        .nohello-link:hover { text-shadow: 0 0 15px var(--gold); }

        .checkbox-row {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            padding: 15px; background: var(--bg2); border: 1px solid var(--border);
        }
        .checkbox-row input { width: 18px; height: 18px; accent-color: var(--gold); }
        .checkbox-row label { font-family: var(--font-ui); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }

        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--surface2); border: 1px solid var(--gold);
            color: var(--gold2); padding: 12px 25px; font-family: var(--font-ui);
            text-transform: uppercase; letter-spacing: 2px; z-index: 6000;
            opacity: 0; transition: 0.4s;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--gold); }
    </style>
</head>
<body ondragstart="return false">

    <div id="cursor">
        <svg viewBox="0 0 32 32" fill="none">
            <path d="M10 2L28 16L16 18L10 28V2Z" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
    </div>

    <div id="toast">Copied!</div>

    <header>
        <div class="logo-area">
            <div class="logo-icon"><div></div></div>
            <h1>Mazer</h1>
        </div>
        <div class="controls-area">
            <select class="hdr-select" id="theme-select">
                <option value="default">⚔ Gold</option>
                <option value="void">✦ Void</option>
                <option value="blood">🩸 Blood</option>
                <option value="forest">🌿 Forest</option>
            </select>
            <select class="hdr-select" id="lang-select">
                <option value="ru">RU</option>
                <option value="en">EN</option>
            </select>
        </div>
    </header>

    <main>
        <div class="main-card">
            <div class="card-content">
                <div class="avatar-container">
                    <div class="avatar-pulse"></div>
                    <img src="изображение.png" alt="Mazer" class="avatar-img" id="avatar-trigger">
                </div>

                <div class="user-name" id="name-trigger">Mazer</div>
                <div class="local-time" id="clock">00:00:00</div>

                <div class="tabs-nav">
                    <button class="tab-btn active" data-target="bio-sec" id="t-bio">Bio</button>
                    <button class="tab-btn" data-target="music-sec" id="t-music">Music</button>
                </div>

                <div id="bio-sec" class="section active">
                    <p id="bio-text" style="color: var(--text2); line-height: 1.7; margin-bottom: 20px;"></p>
                    <button class="btn-gold" id="btn-telegram">My Telegram</button>
                </div>

                <div id="music-sec" class="section">
                    <div class="player-box">
                        <div class="player-main">
                            <div class="track-art" id="curr-art">🎵</div>
                            <div class="track-info">
                                <div class="track-name" id="curr-name">Track Name</div>
                                <div class="track-author" id="curr-author">Artist</div>
                                <div class="visualizer" id="viz">
                                    <div class="v-bar"></div><div class="v-bar"></div><div class="v-bar"></div><div class="v-bar"></div>
                                    <div class="v-bar"></div><div class="v-bar"></div><div class="v-bar"></div><div class="v-bar"></div>
                                </div>
                            </div>
                        </div>

                        <div class="progress-wrap">
                            <div class="progress-bar" id="p-bar-base">
                                <div class="progress-fill" id="p-bar-fill"></div>
                            </div>
                            <div class="time-labels">
                                <span id="time-curr">0:00</span>
                                <span id="time-total">0:00</span>
                            </div>
                        </div>

                        <div class="player-controls">
                            <button class="p-btn" id="p-prev">⏮</button>
                            <button class="p-btn play-pause-btn" id="p-main">▶</button>
                            <button class="p-btn" id="p-next">⏭</button>
                        </div>

                        <div class="playlist" id="playlist-cont"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="nohello-modal">
        <div class="modal-box">
            <div class="modal-stripe"></div>
            <div class="modal-title" id="m-title">Communication Etiquette</div>
            <div class="modal-text" id="m-text">Please read this before messaging me:</div>
            <a href="https://nohello.net/ru/" target="_blank" class="nohello-link" id="nh-link">nohello.net</a>
            
            <div class="checkbox-row">
                <input type="checkbox" id="nh-check" disabled>
                <label for="nh-check" id="m-check">I have read and understood</label>
            </div>
            
            <div id="nh-warn" style="color: var(--danger); font-size: 11px; margin-top: 10px; display: none; text-transform: uppercase;">First open the link!</div>
            
            <button class="btn-gold" id="nh-continue" style="opacity: 0.4;">Continue</button>
        </div>
    </div>

    <script>
        'use strict';

        const CONFIG = {
            tg: 'https://t.me/mazeroxide',
            langs: {
                ru: {
                    bio: "Я Mazer. Создаю цифровые миры, занимаюсь дизайном и интерфейсами. Люблю эстетику и чистый код.",
                    etiquette: "Прочтите это перед тем, как писать мне:",
                    check: "Я всё прочитал и осознал",
                    bioTab: "Био", musicTab: "Музыка",
                    warn: "Сначала нажми на ссылку!",
                    time: "Мое время:"
                },
                en: {
                    bio: "I'm Mazer. Building digital worlds, focused on design and interfaces. Obsessed with aesthetics and clean code.",
                    etiquette: "Read this before messaging me:",
                    check: "I have read and understood",
                    bioTab: "Bio", musicTab: "Music",
                    warn: "Open the link first!",
                    time: "My time:"
                }
            },
            songs: [
                { name: "Suffer with Me", artist: "liue", art: "💀" },
                { name: "Override", artist: "KSLV Noh", art: "⚡" },
                { name: "Metamorphosis", artist: "INTERWORLD", art: "🔮" },
                { name: "Rapture", artist: "INTERWORLD", art: "🔥" }
            ]
        };

        let state = {
            lang: 'ru',
            theme: 'default',
            linkOpened: false,
            currentSong: 0,
            playing: false,
            audio: new Audio()
        };

        document.addEventListener('DOMContentLoaded', () => {
            initCursor();
            initClock();
            initTabs();
            initModals();
            initPlayer();
            updateUI();

            document.getElementById('theme-select').addEventListener('change', (e) => {
                document.body.setAttribute('data-theme', e.target.value);
            });

            document.getElementById('lang-select').addEventListener('change', (e) => {
                state.lang = e.target.value;
                updateUI();
            });
        });

        function initCursor() {
            const cursor = document.getElementById('cursor');
            document.addEventListener('mousemove', (e) => {
                cursor.style.opacity = '1';
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            });
            document.addEventListener('mouseleave', () => cursor.style.opacity = '0');
        }

        function initClock() {
            const el = document.getElementById('clock');
            setInterval(() => {
                const now = new Date();
                const time = now.toLocaleTimeString('en-GB', { timeZone: 'Europe/Warsaw' });
                el.textContent = `${CONFIG.langs[state.lang].time} ${time} (PL)`;
            }, 1000);
        }

        function initTabs() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById(btn.dataset.target).classList.add('active');
                });
            });
        }

        function initModals() {
            const modal = document.getElementById('nohello-modal');
            const check = document.getElementById('nh-check');
            const link = document.getElementById('nh-link');
            const btnCont = document.getElementById('nh-continue');
            const warn = document.getElementById('nh-warn');

            document.getElementById('btn-telegram').onclick = () => {
                modal.style.display = 'flex';
            };

            link.onclick = () => {
                state.linkOpened = true;
                check.disabled = false;
                warn.style.display = 'none';
            };

            check.onclick = () => {
                if(!state.linkOpened) {
                    check.checked = false;
                    warn.style.display = 'block';
                }
                btnCont.style.opacity = check.checked ? '1' : '0.4';
            };

            btnCont.onclick = () => {
                if(check.checked) window.open(CONFIG.tg, '_blank');
            };

            window.onclick = (e) => {
                if(e.target === modal) modal.style.display = 'none';
            };
        }

        function initPlayer() {
            const playlist = document.getElementById('playlist-cont');
            CONFIG.songs.forEach((s, i) => {
                const item = document.createElement('div');
                item.className = 'playlist-item' + (i === 0 ? ' active' : '');
                item.innerHTML = `<span>${i+1}. ${s.name}</span><span>${s.artist}</span>`;
                item.onclick = () => loadSong(i);
                playlist.appendChild(item);
            });

            document.getElementById('p-main').onclick = togglePlay;
            document.getElementById('p-next').onclick = () => loadSong((state.currentSong + 1) % CONFIG.songs.length);
            document.getElementById('p-prev').onclick = () => loadSong((state.currentSong - 1 + CONFIG.songs.length) % CONFIG.songs.length);

            loadSong(0, false);
        }

        function loadSong(idx, autoPlay = true) {
            state.currentSong = idx;
            const s = CONFIG.songs[idx];
            document.getElementById('curr-name').textContent = s.name;
            document.getElementById('curr-author').textContent = s.artist;
            document.getElementById('curr-art').textContent = s.art;

            document.querySelectorAll('.playlist-item').forEach((item, i) => {
                item.classList.toggle('active', i === idx);
            });

            if(autoPlay) {
                state.playing = true;
                updatePlayerUI();
            }
        }

        function togglePlay() {
            state.playing = !state.playing;
            updatePlayerUI();
        }

        function updatePlayerUI() {
            const btn = document.getElementById('p-main');
            const viz = document.querySelectorAll('.v-bar');
            btn.textContent = state.playing ? '⏸' : '▶';
            
            viz.forEach(bar => {
                bar.style.animationPlayState = state.playing ? 'running' : 'paused';
            });

            if(state.playing) {
                let p = 0;
                const interval = setInterval(() => {
                    if(!state.playing) { clearInterval(interval); return; }
                    p += 0.5;
                    if(p > 100) p = 0;
                    document.getElementById('p-bar-fill').style.width = p + '%';
                }, 100);
            }
        }

        function updateUI() {
            const l = CONFIG.langs[state.lang];
            document.getElementById('bio-text').textContent = l.bio;
            document.getElementById('m-text').textContent = l.etiquette;
            document.getElementById('m-check').textContent = l.check;
            document.getElementById('t-bio').textContent = l.bioTab;
            document.getElementById('t-music').textContent = l.musicTab;
            document.getElementById('nh-warn').textContent = l.warn;
        }

        function showToast(text) {
            const t = document.getElementById('toast');
            t.textContent = text;
            t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 2000);
        }
    </script>
</body>
</html>
